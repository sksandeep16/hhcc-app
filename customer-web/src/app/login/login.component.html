<div class="card">
  <div class="card-header">
    <div class="brand-logo">
      <span class="logo-cross">✚</span>
      <span class="logo-name">CareApp</span>
    </div>
    <h2>Welcome Back</h2>
    <p>Sign in to your account</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">

    <!-- Username -->
    <div class="form-group">
      <label for="username">Username</label>
      <input
        id="username"
        type="text"
        formControlName="username"
        placeholder="Enter your username"
        [class.invalid]="username.invalid && username.touched"
      />
      @if (username.touched && username.hasError('required')) {
        <span class="error">Username is required.</span>
      }
    </div>

    <!-- Password -->
    <div class="form-group">
      <label for="password">Password</label>
      <input
        id="password"
        type="password"
        formControlName="password"
        placeholder="Enter your password"
        [class.invalid]="password.invalid && password.touched"
      />
      @if (password.touched && password.hasError('required')) {
        <span class="error">Password is required.</span>
      }
    </div>

    <!-- Error alert -->
    @if (errorMessage) {
      <div class="alert error-alert">{{ errorMessage }}</div>
    }

    <!-- Submit -->
    <button type="submit" [disabled]="loading">
      {{ loading ? 'Signing in...' : 'Sign In' }}
    </button>

  </form>

  <div class="footer-link">
    Don't have an account? <a routerLink="/register">Register here</a>
  </div>
</div>
