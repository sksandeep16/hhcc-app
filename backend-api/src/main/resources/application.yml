server:
  port: 8080

spring:
  application:
    name: hhcc-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/hhcc
    username: hhcc
    password: hhcc123
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: http://localhost:4200,http://localhost:3000
